name: Advanced ML Pipeline

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ml-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: 📦 Install dependencies
      run: pip install -r requirements.txt

    # 🔹 TRAIN
    - name: 🚀 Train model
      run: python train.py

    # 🔹 EVALUATE (GATE)
    - name: 📊 Evaluate model
      run: python evaluate.py

    # 🔹 SAVE MODEL (ONLY IF ABOVE PASSES)
    - name: 📦 Upload model artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: trained-model
        path: model.txt

    # 🔹 SAVE METRICS
    - name: 📊 Upload metrics
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: metrics
        path: metrics.txt
