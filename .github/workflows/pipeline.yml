name: MLflow MLOps Pipeline

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MLFLOW_TRACKING_URI: https://iron-swinging-fall.ngrok-free.dev

jobs:

  # 🔹 TRAIN JOB
  train:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: 📦 Install dependencies
      run: pip install -r requirements.txt

    - name: 🚀 Train + log to MLflow
      run: python train.py

    - name: 📦 Upload model artifact
      uses: actions/upload-artifact@v4
      with:
        name: model
        path: model.txt


  # 🔹 EVALUATE JOB
  evaluate:
    needs: train
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: 📦 Install dependencies
      run: pip install -r requirements.txt

    - name: 📥 Download model
      uses: actions/download-artifact@v4
      with:
        name: model

    - name: 📊 Evaluate model
      run: python evaluate.py


  # 🔹 DEPLOY JOB
  deploy:
    needs: evaluate
    runs-on: ubuntu-latest

    steps:
    - name: 🚀 Deploy
      run: echo "Deploying model..."


